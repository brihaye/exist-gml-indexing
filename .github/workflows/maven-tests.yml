name: Java CI with Maven

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests
      # On force Maven à continuer même si un test échoue pour générer le rapport
      run: mvn test -Dmaven.test.failure.ignore=true

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: target/surefire-reports/*.txt

    - name: Show Errors in Summary
      if: always()
      run: |
        echo "### 🚩 Test Results Summary" >> $GITHUB_STEP_SUMMARY
        if ls target/surefire-reports/*.txt 1> /dev/null 2>&1; then
          grep -h "FAILURE" target/surefire-reports/*.txt >> $GITHUB_STEP_SUMMARY || echo "No failures found in text logs." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ No test reports found. Compilation probably failed!" >> $GITHUB_STEP_SUMMARY
        fi
