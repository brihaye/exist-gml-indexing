name: Java CI with Maven (Java 17)

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4  # <-- Corrigé ici (un seul 'uses:')
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests
      run: mvn test -Dmaven.test.failure.ignore=true

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: target/surefire-reports/*.txt

    - name: Show Errors in Summary
      if: always()
      run: |
        echo "### 🚩 Spatial Index Test Results" >> $GITHUB_STEP_SUMMARY
        if [ -d "target/surefire-reports" ]; then
          echo "#### Detailed Failures:" >> $GITHUB_STEP_SUMMARY
          grep -h "ERROR\|FAILURE" target/surefire-reports/*.txt >> $GITHUB_STEP_SUMMARY || echo "✅ All tests passed." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Critical: Compilation failed!" >> $GITHUB_STEP_SUMMARY
        fi
