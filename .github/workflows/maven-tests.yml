name: Java CI with Maven (Java 17)

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17  # <--- On passe à 17 ici
      uses: uses: actions/setup-java@v4
      with:
        java-version: '17' # <--- Et ici
        distribution: 'temurin'
        cache: maven

    - name: Run Tests
      # On garde ton flag ignore=true pour voir les erreurs spatiales dans le résumé
      run: mvn test -Dmaven.test.failure.ignore=true

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: target/surefire-reports/*.txt

    - name: Show Errors in Summary
      if: always()
      run: |
        echo "### 🚩 Spatial Index Test Results" >> $GITHUB_STEP_SUMMARY
        if [ -d "target/surefire-reports" ]; then
          echo "#### Detailed Failures:" >> $GITHUB_STEP_SUMMARY
          grep -h "ERROR\|FAILURE" target/surefire-reports/*.txt >> $GITHUB_STEP_SUMMARY || echo "✅ All tests passed (or no detailed errors found)." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Critical: Compilation failed or target/surefire-reports is missing!" >> $GITHUB_STEP_SUMMARY
        fi
